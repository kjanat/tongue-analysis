<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0a0a0a"/>
      <stop offset="50%"  stop-color="#150808"/>
      <stop offset="100%" stop-color="#08080f"/>
    </linearGradient>

    <!-- Ambient blob – amber, left -->
    <radialGradient id="blob-amber" cx="50%" cy="50%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#8b4513" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#8b4513" stop-opacity="0"/>
    </radialGradient>

    <!-- Ambient blob – crimson, upper right -->
    <radialGradient id="blob-crimson" cx="50%" cy="50%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#b22222" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#b22222" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow filter for 舌診 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle drop shadow for secondary text -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- ── Background ─────────────────────────────────────── -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient blobs -->
  <ellipse cx="220"  cy="340" rx="500" ry="380" fill="url(#blob-amber)"/>
  <ellipse cx="1020" cy="180" rx="440" ry="340" fill="url(#blob-crimson)"/>

  <!-- ── Frame lines ──────────────────────────────────────── -->
  <line x1="56" y1="36"  x2="1144" y2="36"  stroke="#c9a54e" stroke-width="0.8" opacity="0.25"/>
  <line x1="56" y1="594" x2="1144" y2="594" stroke="#c9a54e" stroke-width="0.8" opacity="0.25"/>
  <!-- Corner ticks -->
  <line x1="56"   y1="36"  x2="56"   y2="62"  stroke="#c9a54e" stroke-width="0.8" opacity="0.25"/>
  <line x1="1144" y1="36"  x2="1144" y2="62"  stroke="#c9a54e" stroke-width="0.8" opacity="0.25"/>
  <line x1="56"   y1="594" x2="56"   y2="568" stroke="#c9a54e" stroke-width="0.8" opacity="0.25"/>
  <line x1="1144" y1="594" x2="1144" y2="568" stroke="#c9a54e" stroke-width="0.8" opacity="0.25"/>

  <!-- ── 舌診 hero characters ────────────────────────────── -->
  <text x="600" y="256"
        font-family="Noto Serif CJK SC" font-weight="700" font-size="192"
        fill="#c9a54e"
        text-anchor="middle"
        filter="url(#glow)">舌診</text>

  <!-- ── TONGDIAGNOSE ──────────────────────────────────────── -->
  <text x="600" y="330"
        font-family="Liberation Sans" font-weight="700" font-size="34"
        fill="#b8a080"
        text-anchor="middle"
        letter-spacing="16"
        filter="url(#shadow)">TONGDIAGNOSE</text>

  <!-- ── Subtitle ─────────────────────────────────────────── -->
  <text x="600" y="376"
        font-family="Liberation Sans" font-size="19"
        font-style="italic"
        fill="#6a5a45"
        text-anchor="middle">Traditionele Chinese Geneeskunde · AI-analyse</text>

  <!-- ── Divider ───────────────────────────────────────────── -->
  <line x1="480" y1="402" x2="720" y2="402" stroke="#c9a54e" stroke-width="0.6" opacity="0.18"/>

  <!-- ── Five-element badges ──────────────────────────────── -->
  <!-- layout: 5 × 96px badges, 14px gap → total 536px, starting at x=332 -->

  <!-- Hout 木 -->
  <rect x="332" y="424" width="96" height="34" rx="17"
        fill="#22783200" stroke="#22783266" stroke-width="1"/>
  <rect x="332" y="424" width="96" height="34" rx="17"
        fill="#227832" fill-opacity="0.18"/>
  <text x="380" y="446"
        font-family="Liberation Sans" font-size="13" font-weight="700"
        fill="#60b070" text-anchor="middle">Hout 木</text>

  <!-- Vuur 火 -->
  <rect x="442" y="424" width="96" height="34" rx="17"
        fill="#b2222200" stroke="#b2222266" stroke-width="1"/>
  <rect x="442" y="424" width="96" height="34" rx="17"
        fill="#b22222" fill-opacity="0.18"/>
  <text x="490" y="446"
        font-family="Liberation Sans" font-size="13" font-weight="700"
        fill="#e07070" text-anchor="middle">Vuur 火</text>

  <!-- Aarde 土 -->
  <rect x="552" y="424" width="96" height="34" rx="17"
        fill="#a0823200" stroke="#a0823266" stroke-width="1"/>
  <rect x="552" y="424" width="96" height="34" rx="17"
        fill="#a08232" fill-opacity="0.18"/>
  <text x="600" y="446"
        font-family="Liberation Sans" font-size="13" font-weight="700"
        fill="#c0a850" text-anchor="middle">Aarde 土</text>

  <!-- Metaal 金 -->
  <rect x="662" y="424" width="96" height="34" rx="17"
        fill="#a0a0aa00" stroke="#a0a0aa66" stroke-width="1"/>
  <rect x="662" y="424" width="96" height="34" rx="17"
        fill="#a0a0aa" fill-opacity="0.18"/>
  <text x="710" y="446"
        font-family="Liberation Sans" font-size="13" font-weight="700"
        fill="#b0b0c0" text-anchor="middle">Metaal 金</text>

  <!-- Water 水 -->
  <rect x="772" y="424" width="96" height="34" rx="17"
        fill="#1e3c7800" stroke="#1e3c7866" stroke-width="1"/>
  <rect x="772" y="424" width="96" height="34" rx="17"
        fill="#1e3c78" fill-opacity="0.18"/>
  <text x="820" y="446"
        font-family="Liberation Sans" font-size="13" font-weight="700"
        fill="#7090d0" text-anchor="middle">Water 水</text>

  <!-- ── URL ───────────────────────────────────────────────── -->
  <text x="600" y="564"
        font-family="Liberation Sans" font-size="15"
        fill="#4a3a28"
        text-anchor="middle"
        letter-spacing="1">kjanat.github.io/tongue-analysis</text>
</svg>
